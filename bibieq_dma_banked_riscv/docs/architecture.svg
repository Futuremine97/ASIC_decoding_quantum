<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .box { fill: #f7f7f7; stroke: #222; stroke-width: 1.5; }
      .title { font: 700 16px 'Helvetica Neue', Arial, sans-serif; fill: #111; }
      .label { font: 14px 'Helvetica Neue', Arial, sans-serif; fill: #111; }
      .small { font: 12px 'Helvetica Neue', Arial, sans-serif; fill: #333; }
      .arrow { stroke: #222; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#222" />
    </marker>
  </defs>

  <rect x="20" y="20" width="1160" height="480" fill="#ffffff" stroke="#e0e0e0" />

  <text x="40" y="50" class="title">BiBiEQ DMA-Banked Accelerator (RISC-V AXI Integration)</text>

  <!-- CPU / Control -->
  <rect x="60" y="90" width="200" height="70" class="box" />
  <text x="75" y="120" class="label">RISC-V CPU</text>
  <text x="75" y="140" class="small">AXI4-Lite</text>

  <rect x="300" y="90" width="220" height="70" class="box" />
  <text x="315" y="120" class="label">AXI-Lite Regs</text>
  <text x="315" y="140" class="small">CTRL/STATUS</text>

  <line x1="260" y1="125" x2="300" y2="125" class="arrow" />

  <!-- Read DMA -->
  <rect x="560" y="70" width="240" height="80" class="box" />
  <text x="575" y="105" class="label">AXI Read Master</text>
  <text x="575" y="125" class="small">Descriptor Fetch</text>

  <line x1="520" y1="125" x2="560" y2="110" class="arrow" />

  <!-- Write DMA -->
  <rect x="560" y="170" width="240" height="80" class="box" />
  <text x="575" y="205" class="label">AXI Write Master</text>
  <text x="575" y="225" class="small">Result Writeback</text>

  <!-- Memory -->
  <rect x="860" y="110" width="260" height="90" class="box" />
  <text x="880" y="145" class="label">External Memory</text>
  <text x="880" y="165" class="small">Descriptors / Results</text>

  <line x1="800" y1="110" x2="860" y2="130" class="arrow" />
  <line x1="800" y1="210" x2="860" y2="170" class="arrow" />

  <!-- Core pipeline -->
  <rect x="120" y="250" width="260" height="80" class="box" />
  <text x="135" y="285" class="label">DMA Desc Fetch</text>
  <text x="135" y="305" class="small">Burst -> FIFO</text>

  <rect x="420" y="250" width="320" height="80" class="box" />
  <text x="435" y="285" class="label">Banked FIFO + Prefetch</text>
  <text x="435" y="305" class="small">Even/Odd + INBUF</text>

  <line x1="380" y1="290" x2="420" y2="290" class="arrow" />

  <rect x="120" y="360" width="260" height="90" class="box" />
  <text x="135" y="395" class="label">Even Worker</text>
  <text x="135" y="415" class="small">Exact/Approx (lane)</text>

  <rect x="420" y="360" width="260" height="90" class="box" />
  <text x="435" y="395" class="label">Odd Worker</text>
  <text x="435" y="415" class="small">Exact/Approx (lane)</text>

  <line x1="580" y1="330" x2="250" y2="360" class="arrow" />
  <line x1="580" y1="330" x2="550" y2="360" class="arrow" />

  <rect x="720" y="360" width="220" height="90" class="box" />
  <text x="735" y="395" class="label">Result Arbiter</text>
  <text x="735" y="415" class="small">Merge streams</text>

  <line x1="380" y1="405" x2="720" y2="405" class="arrow" />
  <line x1="680" y1="405" x2="720" y2="405" class="arrow" />

  <line x1="940" y1="405" x2="560" y2="210" class="arrow" />

  <!-- Notes -->
  <text x="60" y="485" class="small">FAST_MODE_EVEN/ODD enables heterogeneous accuracy/throughput mapping</text>
</svg>
