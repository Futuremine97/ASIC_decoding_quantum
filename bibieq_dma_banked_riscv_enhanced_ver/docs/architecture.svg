<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <style>
      .box { fill: #f7f7f7; stroke: #222; stroke-width: 1.5; }
      .title { font: 700 16px 'Helvetica Neue', Arial, sans-serif; fill: #111; }
      .label { font: 14px 'Helvetica Neue', Arial, sans-serif; fill: #111; }
      .small { font: 12px 'Helvetica Neue', Arial, sans-serif; fill: #333; }
      .arrow { stroke: #222; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .bus { stroke: #0066cc; stroke-width: 2; fill: none; marker-end: url(#arrowheadBlue); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#222" />
    </marker>
    <marker id="arrowheadBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc" />
    </marker>
  </defs>

  <rect x="20" y="20" width="1160" height="520" fill="#ffffff" stroke="#e0e0e0" />
  <text x="40" y="50" class="title">BiBiEQ DMA-Banked Accelerator (RISC-V AXI Integration)</text>

  <!-- Control path -->
  <rect x="60" y="80" width="200" height="60" class="box" />
  <text x="75" y="110" class="label">RISC-V CPU</text>
  <text x="75" y="130" class="small">AXI4-Lite</text>

  <rect x="300" y="80" width="220" height="60" class="box" />
  <text x="315" y="110" class="label">AXI-Lite Regs</text>
  <text x="315" y="130" class="small">CTRL/STATUS</text>

  <line x1="260" y1="110" x2="300" y2="110" class="bus" />

  <!-- Memory + DMA masters -->
  <rect x="500" y="170" width="200" height="60" class="box" />
  <text x="515" y="200" class="label">External Memory</text>
  <text x="515" y="220" class="small">Desc/Results</text>

  <rect x="60" y="170" width="200" height="60" class="box" />
  <text x="75" y="200" class="label">AXI Read Master</text>
  <text x="75" y="220" class="small">Descriptor Fetch</text>

  <rect x="940" y="170" width="200" height="60" class="box" />
  <text x="955" y="200" class="label">AXI Write Master</text>
  <text x="955" y="220" class="small">Result WB</text>

  <line x1="260" y1="200" x2="500" y2="200" class="bus" />
  <line x1="700" y1="200" x2="940" y2="200" class="bus" />

  <!-- Pipeline -->
  <rect x="60" y="300" width="200" height="60" class="box" />
  <text x="75" y="330" class="label">DMA Desc Fetch</text>
  <text x="75" y="350" class="small">Burst -> FIFO</text>

  <rect x="300" y="300" width="200" height="60" class="box" />
  <text x="315" y="330" class="label">Banked FIFO</text>
  <text x="315" y="350" class="small">Even/Odd + INBUF</text>

  <rect x="540" y="280" width="200" height="60" class="box" />
  <text x="555" y="310" class="label">Even Worker</text>
  <text x="555" y="330" class="small">Exact/Approx</text>

  <rect x="540" y="360" width="200" height="60" class="box" />
  <text x="555" y="390" class="label">Odd Worker</text>
  <text x="555" y="410" class="small">Exact/Approx</text>

  <rect x="740" y="320" width="180" height="60" class="box" />
  <text x="755" y="350" class="label">Result Arbiter</text>
  <text x="755" y="370" class="small">Merge</text>

  <rect x="940" y="320" width="200" height="60" class="box" />
  <text x="955" y="350" class="label">DMA Result WB</text>
  <text x="955" y="370" class="small">Stream write</text>

  <!-- Pipeline arrows (no crossings) -->
  <line x1="260" y1="330" x2="300" y2="330" class="arrow" />
  <line x1="500" y1="330" x2="540" y2="310" class="arrow" />
  <line x1="500" y1="330" x2="540" y2="390" class="arrow" />
  <line x1="920" y1="350" x2="940" y2="350" class="arrow" />

  <!-- Workers to arbiter -->
  <line x1="740" y1="310" x2="740" y2="350" class="arrow" />
  <line x1="740" y1="390" x2="740" y2="350" class="arrow" />

  <!-- Masters to pipeline (vertical) -->
  <line x1="160" y1="230" x2="160" y2="300" class="arrow" />
  <line x1="1040" y1="230" x2="1040" y2="320" class="arrow" />

  <text x="60" y="505" class="small">FAST_MODE_EVEN/ODD enables heterogeneous accuracy/throughput mapping</text>
</svg>
