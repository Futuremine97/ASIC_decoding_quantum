<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">
  <defs>
    <style>
      .box { fill: #f8f8f8; stroke: #222; stroke-width: 1.5; }
      .title { font: 700 16px 'Helvetica Neue', Arial, sans-serif; fill: #111; }
      .label { font: 13px 'Helvetica Neue', Arial, sans-serif; fill: #111; }
      .small { font: 11px 'Helvetica Neue', Arial, sans-serif; fill: #333; }
      .arrow { stroke: #222; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .bus { stroke: #0066cc; stroke-width: 2; fill: none; marker-end: url(#arrowheadBlue); }
      .thin { stroke: #555; stroke-width: 1.2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#222" />
    </marker>
    <marker id="arrowheadBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc" />
    </marker>
  </defs>

  <rect x="20" y="20" width="1360" height="660" fill="#ffffff" stroke="#e0e0e0" />
  <text x="40" y="50" class="title">Signal/Bus-Level Diagram (AXI-Lite + AXI4 DMA)</text>

  <!-- CPU and AXI-Lite -->
  <rect x="60" y="90" width="220" height="80" class="box" />
  <text x="75" y="125" class="label">RISC-V CPU</text>
  <text x="75" y="145" class="small">AXI4-Lite Master</text>

  <rect x="320" y="90" width="260" height="80" class="box" />
  <text x="335" y="120" class="label">AXI-Lite Regs</text>
  <text x="335" y="140" class="small">CTRL/STATUS</text>

  <!-- AXI-Lite buses -->
  <line x1="280" y1="115" x2="320" y2="115" class="bus" />
  <text x="185" y="108" class="small">AW/W/B</text>
  <line x1="280" y1="145" x2="320" y2="145" class="bus" />
  <text x="190" y="158" class="small">AR/R</text>

  <!-- Core -->
  <rect x="640" y="70" width="320" height="160" class="box" />
  <text x="655" y="100" class="label">Core Top</text>
  <text x="655" y="120" class="small">bibieq_dma_banked_top</text>
  <text x="655" y="145" class="small">start / busy / done</text>
  <text x="655" y="165" class="small">rd_cmd_valid/ready</text>
  <text x="655" y="185" class="small">mem_rvalid/ready</text>
  <text x="655" y="205" class="small">mem_wvalid/ready</text>

  <!-- Regs to core -->
  <line x1="580" y1="130" x2="640" y2="130" class="thin" />
  <text x="575" y="122" class="small">start_pulse</text>
  <line x1="580" y1="150" x2="640" y2="150" class="thin" />
  <text x="545" y="172" class="small">desc_base/count</text>
  <line x1="580" y1="170" x2="640" y2="170" class="thin" />
  <text x="545" y="192" class="small">rd_burst_len</text>
  <line x1="580" y1="190" x2="640" y2="190" class="thin" />
  <text x="540" y="212" class="small">result_base</text>

  <!-- DMA Masters -->
  <rect x="1020" y="60" width="300" height="90" class="box" />
  <text x="1035" y="95" class="label">AXI Read Master</text>
  <text x="1035" y="115" class="small">AR/R channel</text>

  <rect x="1020" y="170" width="300" height="90" class="box" />
  <text x="1035" y="205" class="label">AXI Write Master</text>
  <text x="1035" y="225" class="small">AW/W/B channel</text>

  <!-- Core to DMA masters -->
  <line x1="960" y1="105" x2="1020" y2="105" class="thin" />
  <text x="870" y="98" class="small">rd_cmd_* / mem_r*</text>

  <line x1="960" y1="205" x2="1020" y2="205" class="thin" />
  <text x="865" y="198" class="small">mem_w* / addr/data/last</text>

  <!-- External Memory -->
  <rect x="1020" y="290" width="300" height="90" class="box" />
  <text x="1035" y="325" class="label">External Memory</text>
  <text x="1035" y="345" class="small">Descriptors + Results</text>

  <!-- AXI buses to memory -->
  <line x1="1170" y1="150" x2="1170" y2="290" class="bus" />
  <text x="1180" y="230" class="small">AXI4</text>
  <line x1="1170" y1="260" x2="1170" y2="290" class="bus" />

  <!-- Internal pipeline -->
  <rect x="120" y="310" width="260" height="90" class="box" />
  <text x="135" y="345" class="label">DMA Desc Fetch</text>
  <text x="135" y="365" class="small">rd_cmd_valid/ready</text>

  <rect x="420" y="310" width="340" height="90" class="box" />
  <text x="435" y="345" class="label">Banked FIFO + Prefetch</text>
  <text x="435" y="365" class="small">even/odd + inbuf</text>

  <line x1="380" y1="355" x2="420" y2="355" class="arrow" />

  <rect x="120" y="430" width="260" height="100" class="box" />
  <text x="135" y="465" class="label">Even Worker</text>
  <text x="135" y="485" class="small">router/schedule</text>
  <text x="135" y="505" class="small">posterior + engine</text>

  <rect x="420" y="430" width="260" height="100" class="box" />
  <text x="435" y="465" class="label">Odd Worker</text>
  <text x="435" y="485" class="small">router/schedule</text>
  <text x="435" y="505" class="small">posterior + engine</text>

  <line x1="590" y1="400" x2="250" y2="430" class="arrow" />
  <line x1="590" y1="400" x2="550" y2="430" class="arrow" />

  <rect x="720" y="430" width="230" height="100" class="box" />
  <text x="735" y="465" class="label">Result Arbiter</text>
  <text x="735" y="485" class="small">m_valid/m_ready</text>

  <line x1="380" y1="480" x2="720" y2="480" class="arrow" />
  <line x1="680" y1="480" x2="720" y2="480" class="arrow" />

  <rect x="980" y="430" width="260" height="100" class="box" />
  <text x="995" y="465" class="label">DMA Result Writeback</text>
  <text x="995" y="485" class="small">mem_wvalid/ready</text>

  <line x1="950" y1="480" x2="980" y2="480" class="arrow" />

  <!-- Core connections to pipeline -->
  <line x1="640" y1="210" x2="250" y2="310" class="thin" />
  <line x1="640" y1="210" x2="980" y2="430" class="thin" />

  <!-- Legend -->
  <text x="60" y="645" class="small">Blue arrows: AXI buses. Black arrows: internal handshakes. Thin arrows: control/config signals.</text>
</svg>
